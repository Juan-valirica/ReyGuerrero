<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A3D"/>
      <stop offset="50%" style="stop-color:#1B4D6E"/>
      <stop offset="100%" style="stop-color:#3D8B8B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#E8B83D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Decorative waves -->
  <path d="M0,250 Q100,230 200,250 T400,250 L400,300 L0,300 Z" fill="#F5F0E6" opacity="0.1"/>
  <path d="M0,270 Q100,250 200,270 T400,270 L400,300 L0,300 Z" fill="#F5F0E6" opacity="0.15"/>

  <!-- Plate circle -->
  <circle cx="200" cy="130" r="70" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="130" r="50" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Fork and knife icons -->
  <g transform="translate(150, 100)" opacity="0.4">
    <!-- Fork -->
    <path d="M10,0 L10,25 M10,25 L10,50 M5,0 L5,15 M15,0 L15,15 M0,0 L0,15 M20,0 L20,15"
          stroke="#F5F0E6" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <g transform="translate(230, 100)" opacity="0.4">
    <!-- Knife -->
    <path d="M10,0 L10,50 M10,0 Q20,10 10,25"
          stroke="#F5F0E6" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="200" y="220" font-family="Georgia, serif" font-size="14" fill="#C9A227" text-anchor="middle" font-style="italic">Rey Guerrero</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#F5F0E6" text-anchor="middle" opacity="0.7">Alta Cocina del Pacifico</text>

  <!-- Decorative dots (spices) -->
  <circle cx="80" cy="60" r="3" fill="#E85D4C" opacity="0.6"/>
  <circle cx="95" cy="75" r="2" fill="#D4763A" opacity="0.5"/>
  <circle cx="70" cy="80" r="2.5" fill="#E8B83D" opacity="0.5"/>
  <circle cx="320" cy="70" r="3" fill="#E85D4C" opacity="0.6"/>
  <circle cx="305" cy="55" r="2" fill="#D4763A" opacity="0.5"/>
  <circle cx="330" cy="85" r="2.5" fill="#E8B83D" opacity="0.5"/>
</svg>
